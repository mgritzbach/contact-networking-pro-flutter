name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.3'
  APP_NAME: contact_networking_pro
  ORG: com.antigravity

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold project
        run: flutter create . --project-name ${{ env.APP_NAME }} --org ${{ env.ORG }}

      - name: Patch AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Camera + contacts permissions
          sed -i 's|<manifest|<manifest|' $MANIFEST
          sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.READ_CONTACTS"/>\n    <uses-permission android:name="android.permission.WRITE_CONTACTS"/>\n    <queries>\n        <package android:name="com.linkedin.android"/>\n        <package android:name="com.whatsapp"/>\n    </queries>\n    <application|' $MANIFEST
          echo "=== Patched manifest ===" && cat $MANIFEST

      - name: Set minSdkVersion to 21
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold project
        run: flutter create . --project-name ${{ env.APP_NAME }} --org ${{ env.ORG }}

      - name: Patch Info.plist (permissions)
        run: |
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Used to scan business cards and QR codes.'" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSContactsUsageDescription string 'Used to save scanned contacts to your address book.'" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Used to pick images containing QR codes.'" $PLIST

      - name: Flutter pub get
        run: flutter pub get

      - name: Disable Xcode code signing
        run: |
          python3 << 'PYEOF'
          import re, pathlib
          p = pathlib.Path('ios/Runner.xcodeproj/project.pbxproj')
          c = p.read_text()
          c = re.sub(r'DEVELOPMENT_TEAM = [^;]*;', 'DEVELOPMENT_TEAM = "";', c)
          c = re.sub(r'CODE_SIGN_STYLE = [^;]*;', 'CODE_SIGN_STYLE = Manual;', c)
          c = re.sub(r'CODE_SIGN_IDENTITY = "[^"]*";', 'CODE_SIGN_IDENTITY = "";', c)
          c = re.sub(r'ProvisioningStyle = Automatic;', 'ProvisioningStyle = Manual;', c)
          p.write_text(c)
          PYEOF

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ContactNetworkingPro.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ContactNetworkingPro.ipa

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ContactNetworkingPro.ipa
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
